<!DOCTYPE html>
<html>
<head>
    <title>Revision Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>📚 Revision Planner</h1>

    <div class="form">
        <input type="text" id="subject" placeholder="Subject">

        <input type="text" id="chapter" placeholder="Chapter Name">

        <label>Completion Date</label>
        <input type="date" id="completionDate">

        <label>Self Revision Completed Date</label>
        <input type="date" id="selfRevisionDate">

        <button onclick="addChapter()">Generate Revision Plan</button>
    </div>

    <h2>Saved Chapters</h2>

    <div id="chapterList"></div>
</div>

<script src="script.js"></script>

</body>
</html>
